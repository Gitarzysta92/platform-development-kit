---
- name: Cluster Master Host Base Provisioning
  hosts: localhost
  become: yes
  vars:
    # PDK defaults (override via extra-vars)
    platform_slug: "{{ platform_slug | default('wapps') }}"
    base_domain: "{{ base_domain | default('wapps.ai') }}"

    apps_dir: "/opt/{{ platform_slug }}"
    # Default TLS certificate paths used by host nginx vhosts (override if needed)
    nginx_ssl_certificate_path: "/etc/ssl/{{ platform_slug }}/fullchain.pem"
    nginx_ssl_certificate_key_path: "/etc/ssl/{{ platform_slug }}/private/privkey.pem"
    # When true, we will include *.api.<env>.<domain> in certificate SANs
    enable_api_gateway_domain: "{{ enable_api_gateway_domain | default(wapps_enable_api_gateway_domain | default(true)) }}"

  tasks:
    - name: Normalize host provisioning environment
      set_fact:
        pdk_target_env: "{{ target_env | default('staging') }}"

    - name: Set DNS labels for public hostnames
      set_fact:
        dns_env_label: "{{ dns_env_label | default(pdk_target_env) }}"

    - name: Set public domain suffix
      set_fact:
        public_domain_suffix: "{{ public_domain_suffix | default(dns_env_label ~ '.' ~ base_domain) }}"

    - name: Display provisioning start
      debug:
        msg: |
          Starting cluster-master host base provisioning...
          Environment: {{ pdk_target_env }}
          Public domain suffix: {{ public_domain_suffix }}
          Target directory: {{ apps_dir }}
          Boundary: host base only. Cluster creation and cluster applications are owned by the client/orchestrator repo.

    - name: Include system configuration
      include_tasks: system/configure.yml

    - name: Include Node Exporter installation
      include_tasks: node-exporter/install.yml
      when: install_node_exporter | default(true) | bool

    - name: Include Tailscale installation
      include_tasks: tailscale/install.yml
      when: install_tailscale | default(true) | bool

    - name: Include TLS certificate provisioning
      include_tasks: certificates/install.yml
      when: install_host_certificates | default(true) | bool

    - name: Include Nginx reverse proxy installation
      include_tasks: nginx/install.yml
      when: install_host_nginx | default(true) | bool

    - name: Include DNS installation
      include_tasks: dns/install.yml
      vars:
        target_ip: "{{ (tailscale_ip.stdout | default('') | trim) if ((tailscale_ip.stdout | default('') | trim) | length > 0) else ansible_default_ipv4.address }}"
      when: install_host_dns | default(true) | bool

    - name: Display provisioning summary
      debug:
        msg: |
          Cluster-master host base provisioning completed.
          Environment: {{ pdk_target_env }}
          Public domain suffix: {{ public_domain_suffix }}
          Applications directory: {{ apps_dir }}
          Host services:
            - OS baseline and firewall
            - Node Exporter: {{ 'enabled' if install_node_exporter | default(true) | bool else 'disabled' }}
            - Tailscale: {{ 'enabled' if install_tailscale | default(true) | bool else 'disabled' }}
            - Host TLS certificates: {{ 'enabled' if install_host_certificates | default(true) | bool else 'disabled' }}
            - Nginx reverse proxy: {{ 'enabled' if install_host_nginx | default(true) | bool else 'disabled' }}
            - dnsmasq DNS helper: {{ 'enabled' if install_host_dns | default(true) | bool else 'disabled' }}
          Cluster boundary:
            - K3s install: not handled by this playbook
            - Argo CD install/bootstrap: not handled by this playbook
            - Ingress controller install: not handled by this playbook
            - Cluster applications/databases: not handled by this playbook
