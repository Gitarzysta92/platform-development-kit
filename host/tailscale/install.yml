---
- name: Install Tailscale
  shell: |
    curl -fsSL https://tailscale.com/install.sh | sh
  register: tailscale_install
  changed_when: tailscale_install.rc == 0

- name: Start Tailscale daemon
  systemd:
    name: tailscaled
    state: started
    enabled: yes
  become: yes

- name: Wait for Tailscale daemon to start
  wait_for:
    path: /var/run/tailscale/tailscaled.sock
    timeout: 30
  ignore_errors: yes

- name: Check Tailscale daemon status
  systemd:
    name: tailscaled
  register: tailscale_status
  changed_when: false

- name: Display Tailscale daemon status
  debug:
    msg: "Tailscale daemon status: {{ tailscale_status.status.ActiveState }}"

- name: Set Tailscale hostname
  set_fact:
    tailscale_device_name: "{{ tailscale_hostname | default(target_env ~ '-' ~ platform_slug) }}"

- name: Authenticate Tailscale with auth key
  shell: tailscale up --authkey="{{ tailscale_auth_key }}" --hostname="{{ tailscale_device_name }}" --accept-dns=true
  when: (tailscale_auth_key | default('')) | length > 0
  register: tailscale_auth
  changed_when: tailscale_auth.rc == 0
  failed_when: false
  no_log: true

- name: Display Tailscale authentication status
  debug:
    msg: |
      Tailscale authentication {{ 'completed' if (tailscale_auth is defined and tailscale_auth.rc == 0) else 'not completed - manual login needed' }}.
      Device hostname: {{ tailscale_device_name }}
      
      {% if tailscale_auth is defined and tailscale_auth.rc == 0 %}
      After authentication, host services can be reached through the Tailscale IP.
      Tailscale will provide DNS names such as:
      - {{ tailscale_device_name }}.tailnet-name.ts.net
      - {{ tailscale_device_name }}.ts.net (if MagicDNS is enabled)
      {% else %}
      To authenticate manually, run: sudo tailscale up --hostname="{{ tailscale_device_name }}" --accept-dns=true
      {% endif %}

- name: Configure Tailscale host networking facts
  block:
    - name: Get Tailscale IP
      shell: tailscale ip -4
      register: tailscale_ip
      changed_when: false
      failed_when: false

    - name: Optionally update kubeconfig with Tailscale IP
      replace:
        path: "{{ ansible_user_dir }}/.kube/config"
        regexp: 'https://{{ ansible_default_ipv4.address }}:6443'
        replace: 'https://{{ tailscale_ip.stdout | default(ansible_default_ipv4.address) }}:6443'
      when:
        - configure_tailscale_kubeconfig | default(false) | bool
        - tailscale_ip.stdout is defined
        - tailscale_ip.stdout != ""

    - name: Display Tailscale networking info
      debug:
        msg: |
          Tailscale IP: {{ tailscale_ip.stdout | default('Not available yet - authenticate first') }}
          Device hostname: {{ tailscale_device_name }}
          Host HTTP/HTTPS endpoints will be available at: {{ tailscale_ip.stdout | default(ansible_default_ipv4.address) }}
