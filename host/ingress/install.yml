---
- name: Set ingress public suffix default
  set_fact:
    ingress_public_suffix: "{{ tailscale_domain | default(public_domain_suffix | default((dns_env_label | default(target_env | default('staging'))) ~ '.' ~ base_domain)) }}"

- name: Install NGINX Ingress Controller
  shell: |
    kubectl apply -f https://raw.githubusercontent.com/kubernetes/ingress-nginx/controller-v1.8.2/deploy/static/provider/cloud/deploy.yaml
  register: nginx_ingress_install

- name: Wait for NGINX Ingress Controller
  shell: kubectl wait --for=condition=available --timeout=300s deployment/ingress-nginx-controller -n ingress-nginx
  register: nginx_ingress_wait
  changed_when: false

- name: Expose NGINX Ingress via NodePort (80->32080, 443->32443)
  shell: |
    kubectl -n ingress-nginx patch svc ingress-nginx-controller -p '{
      "spec": {
        "type": "NodePort",
        "ports": [
          {"name": "http",  "port": 80,  "targetPort": 80,  "nodePort": 32080},
          {"name": "https", "port": 443, "targetPort": 443, "nodePort": 32443}
        ]
      }
    }'
  register: nginx_ingress_nodeport_patch

- name: Create Ingress for K3s API
  shell: |
    cat << 'INGRESS_EOF' | kubectl apply -f -
    apiVersion: networking.k8s.io/v1
    kind: Ingress
    metadata:
      name: k3s-api-ingress
      namespace: default
      annotations:
        nginx.ingress.kubernetes.io/backend-protocol: "HTTPS"
        nginx.ingress.kubernetes.io/ssl-passthrough: "true"
    spec:
      ingressClassName: nginx
      rules:
      - host: k3s-api.{{ ingress_public_suffix }}
        http:
          paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: kubernetes
                port:
                  number: 6443
    INGRESS_EOF
  register: k3s_ingress

- name: Create Ingress for Node Exporter
  shell: |
    cat << 'INGRESS_EOF' | kubectl apply -f -
    apiVersion: networking.k8s.io/v1
    kind: Ingress
    metadata:
      name: metrics-ingress
      namespace: default
    spec:
      ingressClassName: nginx
      rules:
      - host: metrics.{{ ingress_public_suffix }}
        http:
          paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: node-exporter
                port:
                  number: 9100
    INGRESS_EOF
  register: metrics_ingress

- name: Create Node Exporter Service
  shell: |
    cat << 'SERVICE_EOF' | kubectl apply -f -
    apiVersion: v1
    kind: Service
    metadata:
      name: node-exporter
      namespace: default
    spec:
      selector:
        app: node-exporter
      ports:
      - port: 9100
        targetPort: 9100
    SERVICE_EOF
  register: node_exporter_service

# Note: ArgoCD ingress is managed by cluster/argocd/ingress.yaml (typically via client/orchestrator overlays).

- name: Display Ingress Status
  debug:
    msg: |
      Ingress controllers installed successfully!
      
      Ingress ingresses created:
      - K3s API: k3s-api.{{ ingress_public_suffix }}
      - Metrics: metrics.{{ ingress_public_suffix }}
      
      Note: ArgoCD ingress is managed separately via cluster/argocd/ingress.yaml
      with hostname: argocd.{{ ingress_public_suffix }} (applied during bootstrap)
