---
- name: Install dnsmasq
  package:
    name: dnsmasq
    state: present

- name: Set DNS public suffix default
  set_fact:
    dns_public_suffix: "{{ public_domain_suffix | default((dns_env_label | default(target_env | default('staging'))) ~ '.' ~ (base_domains | default([base_domain]))[0]) }}"

# We don't need dnsmasq.d directory since we're using a single config file.

- name: Create dnsmasq configuration
  template:
    src: "{{ 'dnsmasq-splitdns.conf.j2' if (dnsmasq_address_all | default(false)) else 'dnsmasq-main.conf.j2' }}"
    dest: /etc/dnsmasq.conf
    mode: '0644'

- name: Reload systemd daemon
  systemd:
    daemon_reload: yes

- name: Start and enable dnsmasq
  systemd:
    name: dnsmasq
    state: started
    enabled: yes

- name: Restart systemd-resolved
  systemd:
    name: systemd-resolved
    state: restarted

- name: Wait for dnsmasq to start
  wait_for:
    port: "{{ dnsmasq_port | default((dnsmasq_address_all | default(false)) | ternary(53, 5353)) }}"
    host: "127.0.0.1"
    timeout: 10
  ignore_errors: yes

- name: Test DNS resolution through systemd-resolved
  shell: |
    nslookup argocd.{{ dns_public_suffix }} 127.0.0.53
  register: dns_test_result
  changed_when: false
  failed_when: false
  when: target_ip is defined and target_ip != ""

- name: Debug DNS test result
  debug:
    msg: |
      DNS Test Result for {{ dns_public_suffix }}:
      {{ dns_test_result.stdout | default('DNS test not run') }}
  when: dns_test_result is defined

- name: Display DNS configuration status
  debug:
    msg: |
      {% if target_ip is defined and target_ip != "" %}
      ✅ DNS configuration completed successfully!
      
      🌐 Wildcard DNS: *.{{ dns_public_suffix }} → {{ target_ip }}
      
      📍 Service URLs (all resolve to the same IP):
      - ArgoCD: https://argocd.{{ dns_public_suffix }}
      - K3s API: https://k3s-api.{{ dns_public_suffix }}
      - Node Exporter: http://metrics.{{ dns_public_suffix }}
      - Grafana: https://grafana.{{ dns_public_suffix }}
      - Prometheus: https://prometheus.{{ dns_public_suffix }}
      - ANY service: https://anything.{{ dns_public_suffix }}
      
      🔧 DNS Server info:
      - systemd-resolved: 127.0.0.53:53 (stub listener)
      - dnsmasq: 127.0.0.1:5353 (upstream)
      - Environment: {{ target_env }}
      - Target IP: {{ target_ip }}
      
      📋 How it works:
      1. Apps query 127.0.0.53:53 (systemd-resolved)
      2. systemd-resolved forwards to 127.0.0.1:5353 (dnsmasq)
      3. dnsmasq resolves {{ dns_public_suffix }} domains to {{ target_ip }}
      4. Other domains are forwarded to 1.1.1.1 and 9.9.9.9
      {% else %}
      ❌ DNS configuration failed - missing target_ip variable
      {% endif %}
