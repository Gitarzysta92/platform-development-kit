apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: nexus

resources:
  - namespace.yaml
  - ingress.yaml

# Note: This base manages namespace + ingress only.
# Use `cluster/nexus/argo-application` to consume the reusable ArgoCD Application
# (Helm source + pinned chart version + shared values file).
# Remote consumption uses Kustomize Git URL syntax: `<repo>//<path-in-repo>?ref=<branch|tag|sha>`.

