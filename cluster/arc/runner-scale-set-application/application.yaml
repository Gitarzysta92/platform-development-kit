apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: arc-runner-set-client
  namespace: platform
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    description: "Actions Runner Controller (ARC) - runner scale set (client template)"
    argocd.argoproj.io/sync-wave: "20"
spec:
  project: default
  source:
    repoURL: ghcr.io/actions/actions-runner-controller-charts
    chart: gha-runner-scale-set
    targetRevision: 0.12.1
    helm:
      valuesObject:
        githubConfigUrl: https://github.com/example/client-repo
        githubConfigSecret:
          secretRef: arc-github-auth-client
        runnerScaleSetName: arc-runner-set-client
        controllerServiceAccount:
          namespace: platform
          name: arc-controller-gha-rs-controller
        minRunners: 1
        maxRunners: 4
        template:
          spec:
            initContainers:
              - name: init-dind-externals
                image: ghcr.io/actions/actions-runner:latest
                command: ["cp", "-r", "/home/runner/externals/.", "/home/runner/tmpDir/"]
                volumeMounts:
                  - name: dind-externals
                    mountPath: /home/runner/tmpDir
            containers:
              - name: runner
                image: ghcr.io/actions/actions-runner:latest
                command: ["/home/runner/run.sh"]
                env:
                  - name: DOCKER_HOST
                    value: unix:///var/run/docker.sock
                  - name: RUNNER_WAIT_FOR_DOCKER_IN_SECONDS
                    value: "120"
                resources:
                  requests:
                    cpu: "250m"
                    memory: "512Mi"
                    ephemeral-storage: "1Gi"
                  limits:
                    cpu: "2000m"
                    memory: "2Gi"
                    ephemeral-storage: "4Gi"
                volumeMounts:
                  - name: work
                    mountPath: /home/runner/_work
                  - name: dind-sock
                    mountPath: /var/run
              - name: dind
                image: docker:dind
                args:
                  - dockerd
                  - --host=unix:///var/run/docker.sock
                  - --group=$(DOCKER_GROUP_GID)
                env:
                  - name: DOCKER_GROUP_GID
                    value: "123"
                securityContext:
                  privileged: true
                resources:
                  requests:
                    cpu: "500m"
                    memory: "1Gi"
                    ephemeral-storage: "2Gi"
                  limits:
                    cpu: "3000m"
                    memory: "4Gi"
                    ephemeral-storage: "8Gi"
                volumeMounts:
                  - name: work
                    mountPath: /home/runner/_work
                  - name: dind-sock
                    mountPath: /var/run
                  - name: dind-externals
                    mountPath: /home/runner/externals
            volumes:
              - name: work
                emptyDir: {}
              - name: dind-sock
                emptyDir: {}
              - name: dind-externals
                emptyDir: {}
  destination:
    server: https://kubernetes.default.svc
    namespace: client
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
