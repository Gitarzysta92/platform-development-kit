apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: arc-runner-set
  namespace: platform
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    description: "Actions Runner Controller (ARC) - runner scale set"
    argocd.argoproj.io/sync-wave: "20"
spec:
  project: default
  source:
    repoURL: ghcr.io/actions/actions-runner-controller-charts
    chart: gha-runner-scale-set
    targetRevision: 0.12.1
    helm:
      valuesObject:
        githubConfigUrl: https://github.com/example/example-repo
        githubConfigSecret:
          secretRef: arc-github-auth
        minRunners: 1
        maxRunners: 4
        containerMode:
          type: dind
  destination:
    server: https://kubernetes.default.svc
    namespace: arc-runners
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
