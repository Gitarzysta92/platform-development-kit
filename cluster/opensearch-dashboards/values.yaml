# OpenSearch Dashboards Helm Chart Values
# Chart: opensearch-project/opensearch-dashboards
# Docs: https://github.com/opensearch-project/helm-charts/tree/main/charts/opensearch-dashboards
#
# Backend connection + credentials notes:
# - `opensearchHosts` is intentionally NOT set here. The chart default
#   is already `https://opensearch-cluster-master:9200` (TLS-on-by-default
#   on the opensearch chart's HTTP endpoint), which is what we want.
#   Consumer Argo Applications that need to override it (e.g. for a
#   different masterService name) can do so via Helm `valuesObject`.
# - The `opensearchUsername` / `opensearchPassword` keys were removed:
#   they are not part of the `opensearch-dashboards` chart schema in
#   appVersion >= 2.12, and setting them here has no effect. Backend
#   credentials are injected by the consumer Argo Application via
#   `extraEnvs` (OPENSEARCH_USERNAME / OPENSEARCH_PASSWORD) sourced
#   from a Vault-backed K8s Secret — no static password lives in git.

# Service configuration
service:
  type: ClusterIP
  port: 5601

# Resources
resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: 500m
    memory: 1Gi

# Replicas
replicas: 1

# Ingress (disabled - managed by ArgoCD kustomization)
ingress:
  enabled: false
