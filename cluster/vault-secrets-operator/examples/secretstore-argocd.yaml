apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultConnection
metadata:
  name: default
  namespace: vault-secrets-operator
spec:
  address: http://vault.vault.svc.cluster.local:8200
---
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultAuth
metadata:
  name: argocd-auth
  namespace: argocd
spec:
  vaultConnectionRef: default
  method: kubernetes
  mount: kubernetes
  kubernetes:
    role: argocd
    serviceAccount: argocd-server
---
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultStaticSecret
metadata:
  name: argocd-admin
  namespace: argocd
spec:
  mount: kv
  type: kv-v2
  path: argocd/admin
  destination:
    create: true
    name: argocd-admin-secret
  refreshAfter: 24h
  vaultAuthRef: argocd-auth

