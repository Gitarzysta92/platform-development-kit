apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Ingress + auth delegator (no vault-unseal job).
# NOTE: VaultConnection is VSO namespace-scoped config and should be owned by the
# vault-secrets-operator-config layer (to avoid ArgoCD SharedResourceWarning).
# `vault-config` apps: reference //cluster/vault/vault-config?ref=…
namespace: platform

resources:
  - ingress.yaml
  - vault-auth-delegator.yaml
