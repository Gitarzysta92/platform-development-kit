apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Ingress + VSO VaultConnection + auth delegator (no vault-unseal job). Mirrors client
# `vault-config` apps: reference //cluster/vault/vault-config?ref=…
namespace: platform

resources:
  - ingress.yaml
  - vault-connection.yaml
  - vault-auth-delegator.yaml
