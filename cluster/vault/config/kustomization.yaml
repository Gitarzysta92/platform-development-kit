apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Ingress + VSO VaultConnection + auth delegator (no init-unseal). Self-contained paths so
# Kustomize load restrictions pass; client repos may reference //cluster/vault/config?ref=…
namespace: platform

resources:
  - ingress.yaml
  - vault-connection.yaml
  - vault-auth-delegator.yaml
