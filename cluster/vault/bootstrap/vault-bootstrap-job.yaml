apiVersion: v1
kind: ServiceAccount
metadata:
  name: vault-bootstrap
  namespace: platform
---
apiVersion: batch/v1
kind: Job
metadata:
  name: vault-bootstrap
  namespace: platform
spec:
  template:
    spec:
      serviceAccountName: vault-bootstrap
      restartPolicy: OnFailure
      containers:
        - name: bootstrap
          image: hashicorp/vault:1.17.3
          env:
            - name: VAULT_ADDR
              value: http://vault.platform.svc:8200
            - name: VAULT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: vault-root-token
                  key: token
            - name: VSO_ENABLE
              value: "true"
            - name: TENANT_ID
              value: platform
            - name: TENANT_NAMESPACE
              value: platform
            - name: PATH_PREFIX
              value: platform
            - name: POLICY_NAME
              value: platform-vso
            - name: ROLE_NAME
              value: platform-vso
            - name: VSO_SERVICE_ACCOUNT
              value: vault-secrets-operator-controller-manager
            - name: POLICY_PATHS
              value: authenticator/*,argocd/repositories/*
            - name: ROLE_TTL
              value: 24h
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -euo pipefail
              chmod +x /vault/bootstrap/*.sh
              /vault/bootstrap/vault-bootstrap-script.sh
              if [ "${VSO_ENABLE}" = "true" ]; then
                /vault/bootstrap/configure-vso-authz.sh
              fi
          volumeMounts:
            - name: vault-bootstrap-files
              mountPath: /vault/bootstrap
              readOnly: true
      volumes:
        - name: vault-bootstrap-files
          configMap:
            name: vault-bootstrap-files

