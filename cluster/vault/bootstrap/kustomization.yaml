apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: platform

resources:
  - vault-bootstrap-job.yaml

generatorOptions:
  disableNameSuffixHash: true

configMapGenerator:
  - name: vault-bootstrap-files
    files:
      - vault-bootstrap-script.sh=./vault-bootstrap-script.sh
      - configure-vso-authz.sh=./configure-vso-authz.sh
      - argocd.hcl=./policies/argocd.hcl
