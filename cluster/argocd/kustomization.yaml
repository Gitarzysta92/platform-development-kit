apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Upstream install supplies all Argo CD workloads (Deployments, CRDs, etc.). Local
# files layer ingress and ConfigMaps. Repo-server init patch avoids copyutil
# CrashLoopBackOff when the cmp-server symlink already exists.
namespace: argocd
resources:
  - https://raw.githubusercontent.com/argoproj/argo-cd/stable/manifests/install.yaml
  - ingress.yaml

patches:
  - path: applicationsets-crd-sync-options.patch.yaml
    target:
      group: apiextensions.k8s.io
      version: v1
      kind: CustomResourceDefinition
      name: applicationsets.argoproj.io

  - path: argocd-cm.patch.yaml
    target:
      version: v1
      kind: ConfigMap
      name: argocd-cm

  - path: argocd-cmd-params-cm.patch.yaml
    target:
      version: v1
      kind: ConfigMap
      name: argocd-cmd-params-cm

  - path: argocd-rbac-cm.patch.yaml
    target:
      version: v1
      kind: ConfigMap
      name: argocd-rbac-cm

  - path: repo-server-copyutil-cleanup-init.patch.yaml
    target:
      group: apps
      version: v1
      kind: Deployment
      name: argocd-repo-server
