global:
  security:
    allowInsecureImages: true

image:
  registry: docker.io
  repository: bitnamilegacy/keycloak
  pullPolicy: IfNotPresent

auth:
  adminUser: admin
  existingSecret: keycloak-admin-credentials
  passwordSecretKey: KEYCLOAK_ADMIN_PASSWORD

proxyHeaders: xforwarded
httpEnabled: true

production: false

resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: 1000m
    memory: 1Gi

postgresql:
  enabled: true
  image:
    registry: docker.io
    repository: bitnamilegacy/postgresql
    pullPolicy: IfNotPresent
  auth:
    username: keycloak
    database: keycloak
    existingSecret: keycloak-postgresql-auth
    secretKeys:
      adminPasswordKey: postgres-password
      userPasswordKey: password
  primary:
    persistence:
      enabled: true
      size: 8Gi

# Public (end-user) ingress.
# Env MUST override:
#   - ingress.hostname                                       (per-env DNS name)
#   - ingress.annotations."cert-manager.io/cluster-issuer"   (per-env TLS issuer)
# Env MAY override:
#   - ingress.annotations."nginx.ingress.kubernetes.io/app-root"
#     (per-env default landing path, e.g. /admin/platform/console/)
# Placeholder hostname uses example.invalid (RFC 2606) so an un-overridden
# deploy fails loudly at DNS / cert-manager time instead of silently
# shipping a dev hostname into a non-dev env.
ingress:
  enabled: true
  ingressClassName: nginx
  hostname: keycloak.example.invalid
  path: /
  pathType: Prefix
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
  tls: true

# Admin ingress. Same override contract as `ingress` above.
adminIngress:
  enabled: true
  ingressClassName: nginx
  hostname: keycloak-admin.example.invalid
  path: /
  pathType: Prefix
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
  tls: true

